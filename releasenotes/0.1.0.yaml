version: 0.1.0
date: 2026-06-07
highlights:
  - First release. A Claude Code / Codex–style agentic chat panel for your local Ollama models, powered by the open-source OpenCode agent — no cloud model, no API key.
  - Docks into the secondary side bar next to Claude Code / Codex / Chat, with a Claude-style timeline (thinking, tool steps, response), streaming markdown, and inline permission prompts.
added:
  - Chat panel (Activity Bar + secondary side bar, plus "Open in Editor Tab") that drives a headless `opencode serve` pointed at your Ollama server, with the model picker filled by your installed models. The assistant identifies as "Ollama Code".
  - Live model manager in the composer — load / eject Ollama models, with loaded state, context size, and capability badges; per-model context budget and keep-alive controls in the model menu.
  - Multi-server support — register, switch, and remove Ollama servers (local or remote), with chat correctly routed to the active host; an offline mode with a connection banner when a server is unreachable.
  - Context window meter with compaction indicator — real token usage when the model reports it, otherwise estimated from agent overhead, conversation, attachments, and the open file.
  - Thinking on/off toggle, image paste/drag/attach for vision models, and the currently open file attached as excludable context.
  - Session history with persistence and resume; auto-named sessions; delete one or clear all.
  - Auto-loads AGENTS.md / CLAUDE.md (via OpenCode) and warns when they are large relative to the context window.
