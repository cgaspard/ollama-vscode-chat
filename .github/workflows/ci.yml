name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check-types
      - run: npm run compile
      - run: npx vsce package --out ollama-code-dev.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: ollama-code-dev-vsix
          path: ollama-code-dev.vsix
          if-no-files-found: error
          retention-days: 7
