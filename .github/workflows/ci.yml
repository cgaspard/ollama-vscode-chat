name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check-types
      - run: npm test
      # Bundle one representative target so the dev VSIX is a real, runnable
      # package (matches what Release produces). linux-x64 keeps CI fast.
      - run: node scripts/fetch-opencode.js linux-x64
      - run: npx vsce package --target linux-x64 --out ollama-code-dev.vsix
      - name: Verify the dev VSIX bundled the binary
        run: |
          SIZE=$(unzip -l ollama-code-dev.vsix extension/bin/opencode | awk '$4=="extension/bin/opencode" {print $1}')
          if [ -z "$SIZE" ] || [ "$SIZE" -lt 1000000 ]; then
            echo "::error::dev VSIX is missing extension/bin/opencode or it is too small ($SIZE bytes)"
            exit 1
          fi
          echo "OK: opencode bundled ($SIZE bytes)"
      - uses: actions/upload-artifact@v4
        with:
          name: ollama-code-dev-vsix
          path: ollama-code-dev.vsix
          if-no-files-found: error
          retention-days: 7
